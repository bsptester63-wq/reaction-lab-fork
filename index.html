<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">Reaction Lab</h1>
      <p class="subtitle">Test your drag strip reflexes</p>
    </header>

    <main class="panel panel--idle" id="panel">
      <div class="panel-content" id="panelContent">
        <div class="tree" id="tree" aria-label="Drag racing light tree">
          <div class="tree-housing">
            <div class="tree-bulb tree-bulb--prestaged" data-light="prestaged"></div>
            <div class="tree-bulb tree-bulb--staged" data-light="staged"></div>
            <div class="tree-bulb tree-bulb--amber" data-light="amber-1"></div>
            <div class="tree-bulb tree-bulb--amber" data-light="amber-2"></div>
            <div class="tree-bulb tree-bulb--amber" data-light="amber-3"></div>
            <div class="tree-bulb tree-bulb--green" data-light="green"></div>
            <div class="tree-bulb tree-bulb--red" data-light="red"></div>
          </div>
        </div>
        <p class="panel-text" id="panelText">Click start, then launch on green.</p>
        <p class="panel-result" id="panelResult"></p>
      </div>
    </main>

    <div class="controls">
      <button class="btn" id="startBtn">Start</button>
      <div class="best-score" id="bestScore"></div>
    </div>

    <section class="leaderboard">
      <h2 class="leaderboard-title">Your Best Reaction Times</h2>
      <ol class="leaderboard-list" id="leaderboardList"></ol>
    </section>

    <footer class="footer">
      <p>Built for sharp launches and clean lights.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
